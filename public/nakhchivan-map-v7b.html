<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naxçıvan Paylama Şəbəkəsi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D1E40;
  --navy-deep:#06101f;
  --gold:#C8A951;
  --gold-light:#E5CB7A;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--navy-deep);font-family:'Outfit',sans-serif;}

.map-outer{
  position:relative;
  width:100%;
  background:radial-gradient(ellipse at 52% 46%, #102040 0%, #06101f 72%);
  overflow:hidden;
}

/* Subtle atmospheric glow */
.map-outer::after{
  content:'';
  position:absolute;
  left:35%;top:20%;
  width:50%;height:60%;
  background:radial-gradient(ellipse, rgba(200,169,81,0.055) 0%, transparent 68%);
  pointer-events:none;
  z-index:1;
}

svg{position:relative;z-index:2;width:100%;display:block;}

/* Region */
.region-shadow{ fill:rgba(0,0,0,0.4); }
.region-fill{ fill:url(#rGrad); }
.region-glow{ fill:none; stroke:rgba(200,169,81,0.1); stroke-width:12; stroke-linejoin:round; }
.region-border{ fill:none; stroke:url(#bGrad); stroke-width:2; stroke-linejoin:round; filter:url(#fBorder); }
.region-grid{ fill:url(#gPat); }

/* Scan sweep */
.scan{ stroke:rgba(200,169,81,0.13); stroke-width:1.5; fill:none;
  animation:sweep 5s linear infinite; }
@keyframes sweep{
  0%{  transform:translateY(-560px); opacity:0; }
  8%{  opacity:1; }
  92%{ opacity:0.8; }
  100%{ transform:translateY(560px); opacity:0; }
}

/* Routes */
.rt{ fill:none; stroke:#C8A951; stroke-width:1.3; stroke-dasharray:6 5; stroke-linecap:round;
  opacity:0; animation:rtIn 1s ease forwards; }
@keyframes rtIn{ to{ opacity:0.5; } }

/* HQ pulse */
.hq-pulse{ fill:none; stroke:rgba(200,169,81,0.35);
  animation:hqP 3s ease-out infinite; }
.hq-pulse.p2{ animation-delay:1.1s; }
.hq-pulse.p3{ animation-delay:2.2s; }
@keyframes hqP{
  0%{  r:11; stroke-opacity:0.5; stroke-width:2; }
  100%{ r:48; stroke-opacity:0; stroke-width:0.5; }
}
.hq-outer{ fill:#C8A951; filter:url(#fHQ); }
.hq-ring{ fill:none; stroke:var(--navy-deep); stroke-width:2; }
.hq-inner{ fill:#C8A951; }

/* City dots */
.cdot-ring{ fill:none; stroke:#C8A951; stroke-width:1;
  animation:cdR 2.8s ease-out infinite; }
@keyframes cdR{ 0%{r:6; opacity:0.45;} 100%{r:22; opacity:0;} }
.cdot{ fill:#C8A951; stroke:rgba(200,169,81,0.25); stroke-width:5; filter:url(#fDot); }

/* Labels */
.lbl{ opacity:0; animation:lblIn 0.9s ease forwards; }
@keyframes lblIn{ from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:none;} }
.lbg{ fill:rgba(6,16,31,0.92); }
.lbdr{ fill:none; stroke:rgba(200,169,81,0.3); stroke-width:0.8; }
.ltop{ fill:#C8A951; } /* gold accent top bar */
.ltxt{ fill:#e2e2e2; font-family:'Outfit',sans-serif; font-size:12px; font-weight:500; letter-spacing:0.04em; }
.ltxt-hq{ fill:#ffffff; font-family:'Outfit',sans-serif; font-size:11.5px; font-weight:600; letter-spacing:0.07em; }
.ltxt-hq-sub{ fill:rgba(255,255,255,0.55); font-family:'Outfit',sans-serif; font-size:9px; font-weight:400; letter-spacing:0.14em; text-transform:uppercase; }

/* BQ label special animation */
@keyframes bqPulse{
  0%,100%{ opacity:1; }
  50%{ opacity:0.75; }
}
@keyframes bqBorderGlow{
  0%,100%{ stroke:rgba(255,255,255,0.35); stroke-width:0.8; }
  50%{ stroke:rgba(255,255,255,0.7); stroke-width:1.2; }
}
.bq-bg{ fill:#162952; animation:bqPulse 3.5s ease-in-out infinite; }
.bq-accent{ fill:url(#bqGrad); }
.bq-border{ fill:none; stroke:rgba(255,255,255,0.3); stroke-width:0.8; animation:bqBorderGlow 3.5s ease-in-out infinite; }

/* Title block (SVG-internal) */
.ti-eye{ fill:none; stroke:#C8A951; stroke-width:0.8; }
.ti-line{ stroke:rgba(200,169,81,0.5); stroke-width:0.8; }
.ti-sub{ fill:rgba(200,169,81,0.7); font-family:'Outfit',sans-serif; font-size:9px; letter-spacing:0.2em; text-transform:uppercase; }
.ti-h{ fill:rgba(255,255,255,0.88); font-family:'Playfair Display',serif; font-size:17px; font-weight:600; }
.ti-em{ fill:#E5CB7A; font-family:'Playfair Display',serif; font-size:17px; font-style:italic; }

/* Stat boxes (SVG-internal) */
.sb-bg{ fill:rgba(6,16,31,0.82); }
.sb-bdr{ fill:none; stroke:rgba(200,169,81,0.18); stroke-width:0.8; }
.sb-n{ fill:#C8A951; font-family:'Playfair Display',serif; font-size:22px; font-weight:600; }
.sb-l{ fill:rgba(255,255,255,0.35); font-family:'Outfit',sans-serif; font-size:9px; letter-spacing:0.12em; }

/* Corner marks */
.crn{ fill:none; stroke:rgba(200,169,81,0.18); stroke-width:1; }

/* Legend (SVG-internal) */
.lg-bg{ fill:rgba(6,16,31,0.88); }
.lg-bdr{ fill:none; stroke:rgba(200,169,81,0.18); stroke-width:0.8; }
.lg-txt{ fill:rgba(255,255,255,0.4); font-family:'Outfit',sans-serif; font-size:9.5px; letter-spacing:0.12em; }
.lg-sep{ stroke:rgba(255,255,255,0.08); stroke-width:0.8; }
</style>
</head>
