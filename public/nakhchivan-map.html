<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naxçıvan Paylama Şəbəkəsi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D1E40;
  --navy-deep:#06101f;
  --navy-mid:#162952;
  --gold:#C8A951;
  --gold-light:#E5CB7A;
  --gold-dim:rgba(200,169,81,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--navy-deep);font-family:'Outfit',sans-serif;overflow:hidden;}

.map-shell{
  position:relative;
  width:100%;
  background:radial-gradient(ellipse at 55% 45%, #0f2548 0%, #06101f 70%);
  overflow:hidden;
}

/* Atmospheric noise texture */
.map-shell::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.6;pointer-events:none;z-index:0;
}

/* Radial glow behind map center */
.map-glow{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-40%,-48%);
  width:560px;height:420px;
  background:radial-gradient(ellipse, rgba(200,169,81,0.07) 0%, transparent 65%);
  pointer-events:none;z-index:1;
}

svg{position:relative;z-index:2;width:100%;height:auto;display:block;}

/* ── Region shape ── */
.region-shadow{
  fill:rgba(0,0,0,0.35);
  transform:translate(6px,8px);
}
.region-fill{
  fill:url(#regionGrad);
}
.region-border{
  fill:none;
  stroke:url(#borderGrad);
  stroke-width:2.2;
  stroke-linejoin:round;
}
.region-inner-glow{
  fill:none;
  stroke:rgba(200,169,81,0.12);
  stroke-width:8;
  stroke-linejoin:round;
  filter:blur(4px);
}

/* ── Grid overlay on region ── */
.region-grid{
  fill:url(#gridPat);
  opacity:0.6;
}

/* ── Scanning line animation ── */
.scan-line{
  stroke:rgba(200,169,81,0.15);
  stroke-width:1;
  animation:scan 4s linear infinite;
}
@keyframes scan{
  0%{transform:translateY(-460px);opacity:0;}
  10%{opacity:1;}
  90%{opacity:1;}
  100%{transform:translateY(460px);opacity:0;}
}

/* ── HQ ── */
.hq-aura{
  fill:none;stroke:rgba(200,169,81,0.2);
  animation:hqPulse 3s ease-out infinite;
}
.hq-aura.d2{animation-delay:1.2s;}
.hq-aura.d3{animation-delay:2.4s;}
@keyframes hqPulse{
  0%{r:10;stroke-opacity:0.5;stroke-width:2;}
  100%{r:42;stroke-opacity:0;stroke-width:1;}
}
.hq-core{fill:#C8A951;filter:url(#hqGlow);}
.hq-inner{fill:var(--navy-deep);}

/* ── Routes ── */
.route{
  fill:none;
  stroke:url(#routeGrad);
  stroke-width:1.2;
  stroke-dasharray:6 5;
  stroke-linecap:round;
  opacity:0;
  animation:routeAppear 0.6s ease forwards;
}
@keyframes routeAppear{to{opacity:0.55;}}

/* ── City dots ── */
.city-ring{
  fill:none;
  stroke:#C8A951;
  stroke-width:1.2;
  opacity:0.4;
  animation:cityRing 2.5s ease-out infinite;
}
@keyframes cityRing{
  0%{r:6;opacity:0.4;}
  100%{r:18;opacity:0;}
}
.city-dot{
  fill:#C8A951;
  stroke:rgba(200,169,81,0.3);
  stroke-width:5;
  filter:url(#dotGlow);
}

/* ── Labels ── */
.city-label{opacity:0;animation:labelIn 0.5s ease forwards;}
@keyframes labelIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.lbg{fill:rgba(8,18,36,0.9);}
.lborder{fill:none;stroke:rgba(200,169,81,0.35);stroke-width:0.8;}
.ltext{
  fill:#e8e8e8;
  font-family:'Outfit',sans-serif;
  font-size:12.5px;
  font-weight:500;
  letter-spacing:0.04em;
}
.ltext.hq-text{
  fill:#0D1E40;
  font-weight:700;
  font-size:13.5px;
  letter-spacing:0.06em;
}

/* ── Corner decorations ── */
.corner-line{stroke:rgba(200,169,81,0.2);stroke-width:1;fill:none;}

/* ── Legend ── */
#legend{
  position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:28px;
  background:rgba(6,16,31,0.85);
  border:1px solid rgba(200,169,81,0.15);
  border-radius:4px;
  padding:10px 24px;
  z-index:10;
  backdrop-filter:blur(8px);
}
.leg{display:flex;align-items:center;gap:9px;font-size:10.5px;color:rgba(255,255,255,0.4);letter-spacing:.12em;text-transform:uppercase;}
.leg-dot{width:9px;height:9px;border-radius:50%;background:#C8A951;box-shadow:0 0 6px rgba(200,169,81,0.5);}
.leg-dash{width:26px;height:0;border-top:1.5px dashed rgba(200,169,81,0.6);}
.leg-box{width:14px;height:11px;background:rgba(200,169,81,0.1);border:1px solid rgba(200,169,81,0.4);border-radius:2px;}
.leg-sep{width:1px;height:16px;background:rgba(255,255,255,0.08);}

/* ── Title ── */
#map-title{
  position:absolute;top:20px;left:28px;
  z-index:10;
}
#map-title .eyebrow{
  font-size:9px;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--gold);font-weight:500;
  display:flex;align-items:center;gap:8px;margin-bottom:5px;
}
#map-title .eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--gold);}
#map-title h3{
  font-family:'Playfair Display',serif;
  font-size:17px;color:rgba(255,255,255,0.88);
  font-weight:600;line-height:1.2;letter-spacing:0.01em;
}
#map-title h3 em{font-style:italic;color:var(--gold-light);}

/* ── Stats strip ── */
#stats{
  position:absolute;top:20px;right:24px;
  display:flex;flex-direction:column;gap:10px;
  z-index:10;
}
.stat-item{
  text-align:right;
  background:rgba(6,16,31,0.7);
  border:1px solid rgba(200,169,81,0.12);
  border-radius:4px;
  padding:8px 14px;
  backdrop-filter:blur(6px);
}
.stat-n{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:600;color:var(--gold);
  line-height:1;
}
.stat-l{font-size:9.5px;color:rgba(255,255,255,0.35);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}
</style>
</head>
