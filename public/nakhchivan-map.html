<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Naxçıvan Dağıtım Haritası</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D1E40;
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .map-wrapper {
      width: 100%;
      max-width: 1200px;
    }

    #map {
      width: 100%;
      height: 520px;
      border-radius: 8px;
      overflow: hidden;
      background: #0a1628;
    }

    .leaflet-control-attribution,
    .leaflet-control-zoom {
      display: none !important;
    }

    /* HQ pulse animation */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(200,169,81,0.12), 0 0 16px rgba(200,169,81,0.3); }
      50% { box-shadow: 0 0 0 12px rgba(200,169,81,0.06), 0 0 32px rgba(200,169,81,0.6); }
    }

    .district-dot {
      width: 10px;
      height: 10px;
      background: #C8A951;
      border-radius: 50%;
    }

    .district-label {
      background: rgba(8,20,41,0.92);
      color: #fff;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid rgba(200,169,81,0.35);
      white-space: nowrap;
      font-family: 'Outfit', sans-serif;
    }

    /* Flowing dash animation */
    @keyframes dashFlow {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -26; }
    }

    .flowing-dash {
      animation: dashFlow 1.5s linear infinite;
    }

    /* Legend */
    .legend {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.5);
      font-family: 'Outfit', sans-serif;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      background: #C8A951;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-dash {
      width: 24px;
      height: 0;
      border-top: 2px dashed #C8A951;
      opacity: 0.55;
      flex-shrink: 0;
    }

    .legend-region {
      width: 20px;
      height: 14px;
      background: rgba(200,169,81,0.10);
      border: 1.5px solid #C8A951;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="map-wrapper">
    <div id="map"></div>
    <div class="legend">
      <div class="legend-item">
        <span class="legend-dot"></span>
        Dağıtım Noktası
      </div>
      <div class="legend-item">
        <span class="legend-dash"></span>
        Dağıtım Güzergahı
      </div>
      <div class="legend-item">
        <span class="legend-region"></span>
        Naxçıvan MR
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('load', function () {

      var map = L.map('map', {
        center: [39.25, 45.35],
        zoom: 9,
        dragging: false,
        scrollWheelZoom: false,
        zoomControl: false,
        doubleClickZoom: false,
        attributionControl: false
      });

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
      }).addTo(map);

      /* ── Navy color overlay ── */
      L.rectangle(
        [[-90, -180], [90, 180]],
        {
          color: 'transparent', weight: 0,
          fillColor: '#0D1E40', fillOpacity: 0.45,
          interactive: false
        }
      ).addTo(map);

      /* ── Bounding box rectangle ── */
      L.rectangle(
        [[38.85, 44.87], [39.78, 46.22]],
        { color: '#C8A951', weight: 2, fillColor: '#C8A951', fillOpacity: 0.08 }
      ).addTo(map);

      /* ── Districts ── */
      var DISTRICTS = [
        { name: 'Naxçıvan', lat: 39.2092, lng: 45.4122, isHQ: true },
        { name: 'Şərur',    lat: 39.5553, lng: 44.9839 },
        { name: 'Kəngərli', lat: 39.3897, lng: 45.1603 },
        { name: 'Babək',    lat: 39.1514, lng: 45.4489 },
        { name: 'Şahbuz',   lat: 39.4078, lng: 45.5706 },
        { name: 'Culfa',    lat: 38.9583, lng: 45.6317 },
        { name: 'Ordubad',  lat: 38.9022, lng: 46.0236 },
        { name: 'Sədərək',  lat: 39.7197, lng: 44.8797 }
      ];

      var hq = DISTRICTS[0];
      var districts = DISTRICTS.slice(1);

      /* ── HQ Marker with pulse ── */
      var hqIcon = L.divIcon({
        html: '<div style="display:flex;flex-direction:column;align-items:center;gap:4px">' +
          '<div style="width:18px;height:18px;border-radius:50%;background:#C8A951;' +
          'border:3px solid rgba(200,169,81,0.4);' +
          'box-shadow:0 0 0 8px rgba(200,169,81,0.12),0 0 24px rgba(200,169,81,0.5);' +
          'animation:pulse 2s ease-in-out infinite"></div>' +
          '<div style="background:#C8A951;color:#0D1E40;font-weight:700;' +
          'font-size:13px;padding:5px 14px;border-radius:4px;' +
          'white-space:nowrap">Naxçıvan</div></div>',
        className: '',
        iconAnchor: [9, 9]
      });

      L.marker([39.2092, 45.4122], { icon: hqIcon, zIndexOffset: 1000 }).addTo(map);

      /* ── Animate districts sequentially ── */
      districts.forEach(function (d, i) {
        setTimeout(function () {

          /* Dashed polyline from HQ to district */
          var line = L.polyline([[hq.lat, hq.lng], [d.lat, d.lng]], {
            color: '#C8A951',
            weight: 1.5,
            opacity: 0.55,
            dashArray: '8 5'
          }).addTo(map);

          /* Add flowing dash animation */
          var lineEl = line.getElement();
          if (lineEl) {
            lineEl.classList.add('flowing-dash');
          }

          /* District dot marker */
          var dotIcon = L.divIcon({
            className: '',
            html: '<div class="district-dot"></div>',
            iconSize: [10, 10],
            iconAnchor: [5, 5]
          });

          L.marker([d.lat, d.lng], { icon: dotIcon, interactive: false }).addTo(map);

          /* District label (always visible) */
          var labelIcon = L.divIcon({
            className: '',
            html: '<div class="district-label">' + d.name + '</div>',
            iconSize: [0, 0],
            iconAnchor: [-10, 12]
          });

          L.marker([d.lat, d.lng], { icon: labelIcon, interactive: false }).addTo(map);

        }, (i + 1) * 300);
      });

    });
  </script>
</body>
</html>
