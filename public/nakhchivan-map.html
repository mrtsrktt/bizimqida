<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Naxçıvan Dağıtım Haritası</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D1E40;
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .map-wrapper {
      width: 100%;
      max-width: 1200px;
    }

    .svg-container {
      width: 100%;
      height: 520px;
      border-radius: 8px;
      overflow: hidden;
      background: #0D1E40;
    }

    .svg-container svg {
      width: 100%;
      height: 100%;
    }

    /* Route dash flow animation */
    @keyframes dashFlow {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -26; }
    }

    .route-line {
      animation: dashFlow 1.5s linear infinite;
    }

    /* HQ pulse rings */
    @keyframes pulseRing {
      0% { r: 10; opacity: 0.4; }
      100% { r: 28; opacity: 0; }
    }

    .pulse-ring-1 {
      animation: pulseRing 2s ease-out infinite;
    }

    .pulse-ring-2 {
      animation: pulseRing 2s ease-out infinite 0.6s;
    }

    /* Fade in */
    .fade-in {
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .fade-in.visible {
      opacity: 1;
    }

    .region-path {
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .region-path.visible {
      opacity: 1;
    }

    .hq-group {
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .hq-group.visible {
      opacity: 1;
    }

    /* Legend */
    .legend {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding-top: 16px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.5);
      font-family: 'Outfit', sans-serif;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      background: #C8A951;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-dash {
      width: 24px;
      height: 0;
      border-top: 2px dashed #C8A951;
      opacity: 0.55;
      flex-shrink: 0;
    }

    .legend-region {
      width: 20px;
      height: 14px;
      background: rgba(200,169,81,0.10);
      border: 1.5px solid #C8A951;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="map-wrapper">
    <div class="svg-container">
      <svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
        <!-- Background -->
        <rect width="900" height="520" fill="#0D1E40"/>

        <!-- Subtle grid -->
        <defs>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none"
                  stroke="rgba(200,169,81,0.04)" stroke-width="1"/>
          </pattern>
        </defs>
        <rect width="900" height="520" fill="url(#grid)"/>

        <!-- Nakhchivan region shape -->
        <path class="region-path" d="
          M 180,80
          C 200,70 230,65 260,68
          C 290,71 320,78 350,88
          C 380,98 410,110 440,125
          C 470,140 495,158 515,178
          C 535,198 548,220 555,245
          C 562,270 560,295 552,318
          C 544,341 530,362 512,380
          C 494,398 472,413 448,425
          C 424,437 398,446 372,452
          C 346,458 320,461 294,460
          C 268,459 243,454 220,445
          C 197,436 176,423 160,407
          C 144,391 133,372 128,351
          C 123,330 124,308 130,287
          C 136,266 147,246 162,229
          C 177,212 195,197 210,182
          C 225,167 235,152 235,136
          C 235,120 220,103 200,90
          Z
        "
        fill="rgba(30,58,110,0.9)"
        stroke="#C8A951"
        stroke-width="2"
        />

        <!-- Route lines (HQ 420,290 to each district) -->
        <g id="routes"></g>

        <!-- HQ marker group -->
        <g class="hq-group" id="hq-group">
          <circle class="pulse-ring-1" cx="420" cy="290" r="10" fill="none" stroke="#C8A951" stroke-width="2"/>
          <circle class="pulse-ring-2" cx="420" cy="290" r="10" fill="none" stroke="#C8A951" stroke-width="2"/>
          <circle cx="420" cy="290" r="10" fill="#C8A951"/>
          <!-- HQ label -->
          <rect x="385" y="308" width="72" height="24" rx="4" fill="#C8A951"/>
          <text x="421" y="325" text-anchor="middle" fill="#0D1E40" font-family="Outfit, sans-serif" font-weight="700" font-size="13">Naxçıvan</text>
        </g>

        <!-- District markers group -->
        <g id="districts"></g>
      </svg>
    </div>
    <div class="legend">
      <div class="legend-item">
        <span class="legend-dot"></span>
        Dağıtım Noktası
      </div>
      <div class="legend-item">
        <span class="legend-dash"></span>
        Dağıtım Güzergahı
      </div>
      <div class="legend-item">
        <span class="legend-region"></span>
        Naxçıvan MR
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('load', function () {
      var HQ = { x: 420, y: 290 };

      var DISTRICTS = [
        { name: 'Şərur',    x: 245, y: 175 },
        { name: 'Kəngərli', x: 330, y: 240 },
        { name: 'Babək',    x: 450, y: 330 },
        { name: 'Şahbuz',   x: 500, y: 210 },
        { name: 'Culfa',    x: 520, y: 380 },
        { name: 'Ordubad',  x: 640, y: 415 },
        { name: 'Sədərək',  x: 195, y: 120 }
      ];

      var svgNS = 'http://www.w3.org/2000/svg';
      var routesGroup = document.getElementById('routes');
      var districtsGroup = document.getElementById('districts');

      /* Step 1: Fade in region path */
      var regionPath = document.querySelector('.region-path');
      regionPath.classList.add('visible');

      /* Step 2: Fade in HQ marker */
      setTimeout(function () {
        document.getElementById('hq-group').classList.add('visible');
      }, 500);

      /* Step 3: Animate each district sequentially */
      DISTRICTS.forEach(function (d, i) {
        setTimeout(function () {

          /* Route line */
          var line = document.createElementNS(svgNS, 'line');
          line.setAttribute('x1', HQ.x);
          line.setAttribute('y1', HQ.y);
          line.setAttribute('x2', d.x);
          line.setAttribute('y2', d.y);
          line.setAttribute('stroke', '#C8A951');
          line.setAttribute('stroke-width', '1.5');
          line.setAttribute('stroke-dasharray', '8 5');
          line.setAttribute('opacity', '0.55');
          line.classList.add('route-line', 'fade-in');
          routesGroup.appendChild(line);

          /* District group */
          var g = document.createElementNS(svgNS, 'g');
          g.classList.add('fade-in');

          /* Dot */
          var dot = document.createElementNS(svgNS, 'circle');
          dot.setAttribute('cx', d.x);
          dot.setAttribute('cy', d.y);
          dot.setAttribute('r', '6');
          dot.setAttribute('fill', '#C8A951');
          dot.setAttribute('stroke', '#0D1E40');
          dot.setAttribute('stroke-width', '2');
          g.appendChild(dot);

          /* Label background */
          var labelText = d.name;
          var textLen = labelText.length * 7 + 20;
          var labelX = d.x + 12;
          var labelY = d.y - 10;

          var labelBg = document.createElementNS(svgNS, 'rect');
          labelBg.setAttribute('x', labelX);
          labelBg.setAttribute('y', labelY);
          labelBg.setAttribute('width', textLen);
          labelBg.setAttribute('height', '22');
          labelBg.setAttribute('rx', '4');
          labelBg.setAttribute('fill', 'rgba(8,20,41,0.9)');
          labelBg.setAttribute('stroke', 'rgba(200,169,81,0.4)');
          labelBg.setAttribute('stroke-width', '1');
          g.appendChild(labelBg);

          /* Label text */
          var text = document.createElementNS(svgNS, 'text');
          text.setAttribute('x', labelX + textLen / 2);
          text.setAttribute('y', labelY + 15);
          text.setAttribute('text-anchor', 'middle');
          text.setAttribute('fill', '#ffffff');
          text.setAttribute('font-family', 'Outfit, sans-serif');
          text.setAttribute('font-size', '12');
          text.textContent = labelText;
          g.appendChild(text);

          districtsGroup.appendChild(g);

          /* Trigger fade-in */
          requestAnimationFrame(function () {
            line.classList.add('visible');
            g.classList.add('visible');
          });

        }, 800 + (i + 1) * 300);
      });
    });
  </script>
</body>
</html>
